apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "judy.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "judy.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app: judy-council
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "judy.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app: judy-council
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "judy.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app: judy-council
    spec:
      serviceAccountName: {{ include "judy.fullname" . }}
      containers:
        - name: judy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.port }}
          env:
            - name: JUDY_DB_PATH
              value: {{ .Values.env.JUDY_DB_PATH | quote }}
            - name: GRPC_PORT
              value: {{ .Values.env.GRPC_PORT | quote }}
            - name: JUDY_REQUIRE_SIGNATURE
              value: {{ .Values.env.JUDY_REQUIRE_SIGNATURE | quote }}
            - name: CHARON_SIGNATURE_HEADER
              value: {{ .Values.env.CHARON_SIGNATURE_HEADER | quote }}
            - name: CHARON_SIGNATURE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "judy.fullname" . }}-secrets
                  key: CHARON_SIGNATURE_SECRET
            - name: JUDY_GRPC_TLS_ENABLED
              value: {{ .Values.tls.enabled | quote }}
            - name: JUDY_GRPC_TLS_CERT_PATH
              value: {{ printf "%s/%s" .Values.tls.mountPath .Values.tls.certKey | quote }}
            - name: JUDY_GRPC_TLS_KEY_PATH
              value: {{ printf "%s/%s" .Values.tls.mountPath .Values.tls.keyKey | quote }}
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: grpc-tls
              mountPath: {{ .Values.tls.mountPath | quote }}
              readOnly: true
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: grpc-tls
          secret:
            secretName: {{ .Values.tls.serverSecretName | quote }}
      {{- end }}
