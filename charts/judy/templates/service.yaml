apiVersion: v1
kind: Service
metadata:
  name: {{ include "judy.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "judy.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app: judy-council
  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: grpc
